<!doctype html>
<html lang="zh-CN">
<head>

  <title>&#27426;&#36814;&#20351;&#29992; AI &#27169;&#22411;&#26381;&#21153;&#24179;&#21488;</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9e1ec;
      --primary: #2563eb;
      --primary-weak: #dbeafe;
      --success: #059669;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --line: #263244;
        --primary: #60a5fa;
        --primary-weak: #1e3a8a;
        --success: #34d399;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page { min-height: 100vh; padding: 48px 20px; }
    .wrap { width: min(1120px, 100%); margin: 0 auto; }

    .hero {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      padding: 34px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--primary-weak);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead {
      max-width: 760px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 20px;
    }

    .card h2 { margin: 0 0 12px; font-size: 18px; }
    .card p { margin: 6px 0; color: var(--muted); line-height: 1.7; }
    .highlight { color: var(--success); font-weight: 700; }

    .notice {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 18px 20px;
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 760px) {
      .page { padding: 24px 14px; }
      .hero { padding: 24px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
